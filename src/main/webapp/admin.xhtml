<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
	"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<h:outputStylesheet library="css" name="estilos.css" />
	<title>Vista Administrador</title>
</h:head>

<h:body>
<div class="contenedor">


	<h1>Listado de Aspirantes Registrados</h1>

	<h:panelGroup rendered="#{empty asp.listaAs}">
		<h3>No hay aspirantes registrados todavía.</h3>
	</h:panelGroup>

	<h:panelGroup rendered="#{not empty asp.listaAs}">
		<h:dataTable value="#{asp.listaAs}" var="a" border="1">

			<h:column>
				<f:facet name="header">#</f:facet>
				<h:outputText value="#{asp.listaAs.indexOf(a) + 1}" />
			</h:column>

			<h:column>
				<f:facet name="header">Identificación</f:facet>
				<h:outputText value="#{a.id_p}" />
			</h:column>

			<h:column>
				<f:facet name="header">Nombres</f:facet>
				<h:outputText value="#{a.nombres}" />
			</h:column>

			<h:column>
				<f:facet name="header">Apellidos</f:facet>
				<h:outputText value="#{a.apellidos}" />
			</h:column>

			<h:column>
				<f:facet name="header">Correo</f:facet>
				<h:outputText value="#{a.correo}" />
			</h:column>

			<h:column>
				<f:facet name="header">Teléfono</f:facet>
				<h:outputText value="#{a.telefono}" />
			</h:column>

			<h:column>
				<f:facet name="header">Programa académico</f:facet>
				<h:outputText value="#{a.pro_acad.nombre_prog}" />
			</h:column>

		</h:dataTable>
	</h:panelGroup>

</div>

	<footer>
		<a href="index.xhtml">Inicio</a>
		<br /><br />
		<h4>Julian Camilo Vargas Carvajal - Programación Avanzada - 578-301 - Universidad Distrital Francisco Jose de Caldas - 2026</h4>
	</footer>

</h:body>
</html>
